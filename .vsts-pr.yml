# Pipeline: https://dev.azure.com/dnceng-public/public/_build?definitionId=231

variables:
  - name: _TeamName
    value: DotNetCore
  - name: Build.Repository.Clean
    value: true

trigger:
  batch: true
  branches:
    include:
    - main
  paths:
    exclude:
    - "*.md"

stages:
- stage: Build_Windows
  displayName: Build Windows
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      enableMicrobuild: true
      jobs:
      - job: Windows
        pool: # See https://helix.dot.net/ for VM names.
          name: NetCore-Public
          demands: ImageOverride -equals windows.vs2022.amd64.open
        variables:
          - name: _SignType
            value: test
        strategy:
          matrix:
            Release:
              _BuildConfig: Release
        steps:
        - script: eng\common\CIBuild.cmd
            -configuration $(_BuildConfig)
            -prepareMachine
          name: Build
          displayName: Build and run tests
          condition: succeeded()
        - task: PublishTestResults@2
          displayName: 'Publish test results'
          inputs:
            testResultsFormat: xUnit
            testResultsFiles: '$(Build.SourcesDirectory)/artifacts/TestResults/**/*.xml'
            mergeTestResults: true
            searchFolder: $(System.DefaultWorkingDirectory)
            testRunTitle: sign unit tests - $(Agent.JobName)
          condition: succeededOrFailed()
        - template: /eng/common/templates/steps/publish-build-artifacts.yml
          parameters:
            displayName: 'Publish NuGet package'
            pathToPublish: '$(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)/Shipping'
            artifactName: 'Packages'
            condition: succeeded()
        - template: /eng/common/templates/steps/publish-build-artifacts.yml
          parameters:
            displayName: 'Publish log files on failure'
            pathToPublish: '$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)'
            artifactName: 'Logs'
            condition: failed()

- stage: Validate_Linux_Restore
  displayName: Validate tool restore (Linux)
  dependsOn: Build_Windows
  jobs:
  - job: Linux
    pool:
      name: NetCore-Public
      demands: ImageOverride -equals build.azurelinux.3.amd64.open
    steps:
    - checkout: none
    - task: DownloadBuildArtifacts@1
      displayName: 'Download NuGet package'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'Packages'
        downloadPath: '$(System.DefaultWorkingDirectory)'
    - script: |
        set -euo pipefail
        NUPKG="$(find "$(System.DefaultWorkingDirectory)/Packages" -name '*.nupkg' -print -quit)"
        if [ ! -f "$NUPKG" ]; then
            echo "ERROR: No .nupkg found in Packages artifact"
            exit 1
        fi
        NUPKG="$(realpath "$NUPKG")"
        WORKDIR="$(mktemp -d)"
        trap 'rm -rf "$WORKDIR"' EXIT
        FEED_DIR="$WORKDIR/feed"
        mkdir -p "$FEED_DIR"
        cp "$NUPKG" "$FEED_DIR/"
        NUSPEC="$(unzip -p "$NUPKG" '*.nuspec')"
        PACKAGE_ID="$(echo "$NUSPEC" | sed -n 's/.*<id>\([^<]*\)<\/id>.*/\1/p' | head -1)"
        PACKAGE_VERSION="$(echo "$NUSPEC" | sed -n 's/.*<version>\([^<]*\)<\/version>.*/\1/p' | head -1)"
        echo "Validating restore: $PACKAGE_ID @ $PACKAGE_VERSION"
        cd "$WORKDIR"
        dotnet new tool-manifest
        dotnet tool install "$PACKAGE_ID" --version "$PACKAGE_VERSION" --add-source "$FEED_DIR"
        dotnet tool restore --verbosity detailed
      displayName: 'Validate dotnet tool restore on Linux'
